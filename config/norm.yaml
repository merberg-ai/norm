config_version: 2

app:
  name: "N.O.R.M."
  full_name: "Neural Overseer for Routine Management"
  codename: "beta2-pre2"
  install_id: "norm-beta2"
  safe_mode: false

paths:
  data_dir: "./data"
  logs_dir: "./data/logs"
  plugins_dir: "./plugins"

webui:
  enabled: true
  host: "0.0.0.0"
  port: 8090
  uvicorn_log_level: "warning"

logging:
  level: "INFO"
  file_enabled: true
  file_name: "norm-beta2.log"
  console_enabled: true

runtime:
  heartbeat_seconds: 30
  print_startup_report: true
  keep_running: true

services:
  plugin_manager:
    enabled: true
  webui:
    enabled: true
