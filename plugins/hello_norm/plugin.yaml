manifest_version: 1
id: hello_norm
name: "Hello N.O.R.M."
version: "0.2.0"
description: "Tiny demo plugin proving discovery, lifecycle, health, API status, and configurable web routes."
enabled: true
entrypoint: "main:Plugin"
permissions:
  - events
  - webui
webui:
  enabled: true
  route: "/hello"
  label: "Hello"
  nav_enabled: true
  nav_group: "Debug"
  icon: "sparkles"
